	<div class="container-fluid">
	<form>
		<label>Digite Seu Peso (em kg, sem pontos ou vírgulas) </label>
		<input class="form-control form-control-sm" id="peso" name="peso" value="" type="number" placeholder="Ex: 80"><br>
		<label>Digite Sua Altura (em metros, separando por ".") </label>
		<input class="form-control" id="altura" name="altura" value="" type="number" placeholder="Ex: 1.80"><br>
		<button class="btn btn-success" onclick="imc()">Calcular</button>
	</form><br>
	<h3 class="bg-success text-light" id="resultado"></h3><br>
	</div>
	<div class="container-flex">
	<table class="table-sm">
	<thead class="thead bg-success text-light">
	<tr>
	<th scope="col">IMC</th>
	<th scope="col">Nível</th>
	<th scope="col">Obesidade</th>
	</tr>
	</thead>
	<tbody>
	<tr>
	<td>Menor que 18.5</td>
	<td>Abaixo do Peso</td>
	<td class="text-center">0</td>
	</tr>
	<tr>
	<td>De 18.5 a 24.9</td>
	<td>Normal</td>
	<td class="text-center">0</td>
	</tr>
	<tr>
	<td>De 25,0 a 29,9</td>
	<td>Sobrepeso</td>
	<td class="text-center">1</td>
	</tr>
	<tr>
	<td>De 30,0 a 39,9</td>
	<td>Obesidade</td>
	<td class="text-center">2</td>
	</tr>
	<tr>
	<td>Acima de 40</td>
	<td>Obesidade Grave</td>
	<td class="text-center">3</td>
	</tr>	
	</tbody>
	</table>

	<script>
	function imc() {
	var peso = document.getElementById("peso").value;
	var altura = document.getElementById("altura").value;
	
	var total = peso/(altura*altura);
	
	var resultado = document.getElementById("resultado").innerHTML= total.toFixed(2);
	}
	
	</script>
